<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title id="pageTitle">Warframe Builds - Minch Configuration</title>

  <meta id="metaDescription" name="description" content="Configurations Warframe optimisées par Minch. Builds, fragments d'archonte, armes et compagnons pour chaque Warframe.">
  <meta id="metaKeywords" name="keywords" content="Warframe build, Warframe configuration, Warframe builds, Minch Warframe, Warframe fragments archonte">
  <meta name="author" content="Minch">

  <meta id="ogTitle" property="og:title" content="Minch Warframe Builds">
  <meta id="ogDescription" property="og:description" content="Les meilleures configurations Warframe par Minch">
  <meta property="og:type" content="website">
  <meta id="ogUrl" property="og:url" content="">
  <meta property="og:site_name" content="Minch's Build">

  <link id="canonicalLink" rel="canonical" href="">
  <link rel="stylesheet" href="style.css">

  <script type="application/ld+json" id="seoJsonLd">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Minch's Build",
    "url": ""
  }
  </script>
</head>

<body>
  <!-- Vidéo fond accueil -->
  <video
    id="homeBgVideo"
    class="bg-video bg-video-home"
    autoplay
    muted
    loop
    playsinline
    preload="auto"
  >
    <source src="media/home-loop.mp4" type="video/mp4">
  </video>

  <!-- Overlay léger -->
  <div class="screen-overlay"></div>

  <!-- Musique -->
 <audio controls>
  <source src="media/background-music.mp3" type="audio/mpeg">
</audio>

  <!-- Contrôle musique -->
  <div class="music-panel" id="musicPanel">
    <button id="musicToggle" class="music-toggle paused" type="button" aria-label="Lancer la musique">
      <span class="music-disc"></span>
      <span class="music-icon" id="musicIcon">
        <svg id="iconPlay" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M8 5v14l11-7z"></path>
        </svg>
        <svg id="iconPause" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7 5h4v14H7zM13 5h4v14h-4z"></path>
        </svg>
      </span>
    </button>

    <div class="volume-wrap">
      <input id="volumeSlider" type="range" min="0" max="100" value="10" aria-label="Volume musique">
    </div>
  </div>

  <!-- Intro -->
  <div id="introScreen" class="intro-screen">
    <video id="introVideo" class="intro-video" autoplay muted playsinline>
      <source src="media/intro.mp4" type="video/mp4">
    </video>
    <div class="intro-fallback"></div>
  </div>

  <!-- Contenu accueil -->
  <div id="homeUI" class="home-ui hidden-ui">
    <header>
      <h1>Minch's Warframe Configurations</h1>
    </header>

    <div class="search-container">
      <input
        id="search"
        type="text"
        placeholder="Rechercher Warframe..."
        oninput="filterWarframes()"
      >
    </div>

    <div id="warframeGrid" class="grid"></div>
  </div>

  <!-- Transition -->
  <div id="pageTransition" class="page-transition"></div>

  <!-- Page build -->
  <div id="buildPage" class="buildpage">
    <button class="back" onclick="closeBuild()" aria-label="Retour">←</button>

    <div class="build-layout">
      <div id="buildContent" class="build-content"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
